# Builds and verifies the project on every push to main and on every pull request.
# This is the gate that catches breakage (e.g. Renovate dependency bumps) before
# it lands on main — the publish workflow only runs on release, so without this a
# red build stays invisible until release time.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # needed to resolve com.druvu:* deps from GitHub Packages

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          java-package: 'jdk+fx'
          cache: 'maven'
          # Generates ~/.m2/settings.xml with a <server id="github"> entry,
          # matching the <repository id="github"> in pom.xml.
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Build and verify
        run: mvn -B verify
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
